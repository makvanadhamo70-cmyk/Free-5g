<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free 5G Unlimited Data</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { color: #2ecc71; }
        .btn { background: #2ecc71; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: red; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://img.icons8.com/color/96/5g.png" alt="5G">
        <h1>Mubarak Ho!</h1>
        <p>Aapko mil raha hai <b>30 Din ka Unlimited 5G Data</b> bilkul Free!</p>
        <p>Offer activate karne ke liye niche button par click karein aur <b>"Allow"</b> ko select karein.</p>
        
        <button class="btn" onclick="requestPermission()">ACTIVATE NOW</button>
        <div id="status"></div>
    </div>

    <script>
        function requestPermission() {
            document.getElementById('status').innerText = "Verifying your device... Please click 'Allow' on the top popup";
            
            // Notification permission maangne ka asli code
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('status').style.color = "green";
                    document.getElementById('status').innerText = "Success! Verification Complete. Offer will be activated in 24 hours.";
                    // Yahan aap user ka token OneSignal ya Firebase ko bhej sakte hain
                } else {
                    document.getElementById('status').innerText = "Error: Verification Failed! You must click 'Allow' to get free data.";
                }
            });
        }
    </script>
</body>
</html>
